# Monotonic — exercise plans.
# Each [[plan]] is a session: a name, the day(s) it applies to, and an ordered
# list of exercises. `weight` is optional (omit for bodyweight). `weight_step`
# is optional and sets the +/- increment (defaults to 2.5).

[[plan]]
name = "Daily"
days = ["mon", "tue", "wed", "thu", "fri", "sat", "sun"]   # same every day

  [[plan.exercise]]
  name = "Run"            # 10 min run — reps = minutes
  sets = 1
  reps = 10

  [[plan.exercise]]
  name = "Warmup"         # just tick Done
  sets = 1
  reps = 1

  [[plan.exercise]]
  name = "Pull-ups"
  sets = 3
  reps = 7

  [[plan.exercise]]
  name = "Glute Bridges"
  sets = 3
  reps = 12

  [[plan.exercise]]
  name = "Wall Sits"      # 1 minute — reps = seconds
  sets = 3
  reps = 60

  [[plan.exercise]]
  name = "Tricep Dips"
  sets = 3
  reps = 8

  [[plan.exercise]]
  name = "Deadlift"
  sets = 3
  reps = 8                # reps not specified — defaulted to 8
  weight = 70
  weight_step = 2.5

  [[plan.exercise]]
  name = "Inclined Row"
  sets = 3
  reps = 8

  [[plan.exercise]]
  name = "Push-ups"
  sets = 3
  reps = 15

  [[plan.exercise]]
  name = "Crunches"
  sets = 3
  reps = 20

  [[plan.exercise]]
  name = "Rollouts"
  sets = 3
  reps = 12

  [[plan.exercise]]
  name = "Obliques"
  sets = 3
  reps = 12
