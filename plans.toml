# Monotonic — exercise plans.
# Each [[plan]] is a session: a name, the day(s) it applies to, and an ordered
# list of exercises. `weight` is optional (omit for bodyweight). `weight_step`
# is optional and sets the +/- weight increment (defaults to 2.5).
#
# `unit` changes the middle field: "reps" (default, a count), "min" (whole
# minutes), or "time" (shown mm:ss, stored as seconds). `rep_step` sets its
# +/- increment (defaults to 1, or 15 for time). For unit="time" set `reps`
# to the number of seconds (e.g. 60 = 1:00).
#
# `rest_days` (optional, top-level) lists weekdays to take off. On a rest day
# the app shows a "Rest day" screen instead of auto-loading a plan; you can
# still switch plan to train anyway. Names accept any case/length, e.g.
# rest_days = ["sun"]  or  rest_days = ["Saturday", "sun"].

rest_days = ["sun"]

[[plan]]
name = "Daily"
days = ["mon", "tue", "wed", "thu", "fri", "sat", "sun"]   # same every day

  [[plan.exercise]]
  name = "Run"            # 10 min run (switch unit to "time" for mm:ss)
  sets = 1
  reps = 10
  unit = "min"

  [[plan.exercise]]
  name = "Warmup"         # just tick Done
  sets = 1
  reps = 1

  [[plan.exercise]]
  name = "Pull-ups"
  sets = 3
  reps = 7

  [[plan.exercise]]
  name = "Glute Bridges"
  sets = 3
  reps = 12

  [[plan.exercise]]
  name = "Wall Sits"      # 1 minute hold, shown mm:ss, +/- 15s
  sets = 3
  reps = 60
  unit = "time"

  [[plan.exercise]]
  name = "Tricep Dips"
  sets = 3
  reps = 8

  [[plan.exercise]]
  name = "Deadlift"
  sets = 3
  reps = 8                # reps not specified — defaulted to 8
  weight = 70
  weight_step = 2.5

  [[plan.exercise]]
  name = "Inclined Row"
  sets = 3
  reps = 8

  [[plan.exercise]]
  name = "Push-ups"
  sets = 3
  reps = 15

  [[plan.exercise]]
  name = "Crunches"
  sets = 3
  reps = 20

  [[plan.exercise]]
  name = "Rollouts"
  sets = 3
  reps = 12

  [[plan.exercise]]
  name = "Obliques"
  sets = 3
  reps = 12
