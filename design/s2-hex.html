<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Monotonic — Hex style</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@1,9..144,400;1,9..144,500&family=Hanken+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#f4f2ed; --card:#ffffff; --ink:#1a1814; --body:#57534b; --muted:#9c968a;
    --line:#e7e2d8; --coral:#fb503b; --corald:#e23f2c;
    --sans:"Hanken Grotesk",sans-serif; --serif:"Fraunces",serif;
    --shadow:0 1px 2px rgba(26,24,20,.04),0 8px 22px rgba(26,24,20,.06);
  }
  *{box-sizing:border-box;margin:0;-webkit-tap-highlight-color:transparent}
  body{font-family:var(--sans);color:var(--ink);-webkit-font-smoothing:antialiased;user-select:none;
    background:var(--bg);
    background-image:radial-gradient(rgba(26,24,20,.035) 1px,transparent 1px);
    background-size:24px 24px;
    max-width:480px;margin:0 auto;min-height:100dvh;padding:30px 18px 60px}

  .kicker{font-family:var(--serif);font-style:italic;font-size:18px;color:var(--body);font-weight:400}
  .h1wrap{display:flex;align-items:flex-start;justify-content:space-between;margin-top:2px}
  h1{font-size:38px;font-weight:800;letter-spacing:-.025em;line-height:.95;position:relative;display:inline-block}
  .star{color:var(--coral);font-size:20px;vertical-align:14px;margin-left:4px}
  .pill{font-size:12px;font-weight:600;color:var(--coral);border:1.5px solid var(--coral);
    padding:6px 13px;border-radius:99px;white-space:nowrap;margin-top:6px}
  .rule{height:1px;background:var(--line);margin:20px 0 16px}

  .cell{background:var(--card);border:1px solid var(--line);border-radius:13px;box-shadow:var(--shadow);
    padding:15px 16px;margin-bottom:11px}
  .cell.ahead{box-shadow:var(--shadow),inset 3px 0 0 var(--coral)}
  .top{display:flex;align-items:baseline;justify-content:space-between;gap:10px}
  .nm{font-size:19px;font-weight:700;letter-spacing:-.015em}
  .last{font-family:var(--serif);font-style:italic;font-size:13.5px;color:var(--muted);white-space:nowrap}
  .last b{color:var(--coral);font-style:normal;font-weight:700;font-family:var(--sans)}
  .ctl{display:flex;align-items:center;gap:8px;margin-top:13px;flex-wrap:wrap}
  .grp{display:inline-flex;align-items:center;background:#faf8f3;border:1px solid var(--line);border-radius:10px}
  .grp .k{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.09em;padding:0 4px 0 11px}
  .grp button{width:30px;height:33px;border:none;background:transparent;color:var(--body);font-size:17px}
  .grp button:active{color:var(--ink)}
  .grp .v{min-width:28px;text-align:center;font-size:14px;font-weight:700;font-variant-numeric:tabular-nums}
  .sp{flex:1 0 auto}
  .go{border:1.5px solid var(--coral);background:transparent;color:var(--coral);font-family:var(--sans);
    font-size:13.5px;font-weight:700;padding:8px 16px;border-radius:10px}
  .go:active{background:var(--coral);color:#fff}
  .cell.done{opacity:.55}
  .cell.done .nm{text-decoration:line-through}
  .go.is{background:var(--coral);color:#fff;border-color:var(--coral)}
</style>
</head>
<body>
  <div class="kicker">Today’s session</div>
  <div class="h1wrap">
    <h1>Daily<span class="star">✳</span></h1>
    <span class="pill">1 of 5 done</span>
  </div>
  <div class="rule"></div>
  <div id="list"></div>

<script>
const EX=[
 {name:"Run",sets:1,val:10,unit:"min",last:10,cue:"same"},
 {name:"Pull-ups",sets:3,val:7,unit:"reps",last:7,cue:"same"},
 {name:"Wall Sits",sets:3,val:65,unit:"time",last:60,cue:"up"},
 {name:"Deadlift",sets:3,val:8,unit:"reps",weight:72.5,last:8,lastW:70,cue:"up"},
 {name:"Push-ups",sets:3,val:15,unit:"reps",last:15,cue:"same",done:true},
];
const mmss=s=>`${Math.floor(s/60)}:${String(s%60).padStart(2,"0")}`;
const vstr=(e,v=e.val)=>e.unit==="time"?mmss(v):`${v}`;
const klab=e=>e.unit==="time"?"Time":e.unit==="min"?"Min":"Reps";
function lastStr(e){
  let s=e.unit==="time"?`${e.sets}×${mmss(e.last)}`:e.unit==="min"?`${e.last} min`:`${e.sets}×${e.last}`;
  if(e.lastW)s+=` · ${e.lastW}`;
  return s;
}
const list=document.getElementById("list");
EX.forEach(e=>{
  const c=document.createElement("div");
  c.className="cell"+(e.cue==="up"?" ahead":"")+(e.done?" done":"");
  c.innerHTML=`
    <div class="top"><span class="nm">${e.name}</span><span class="last">last <b>${lastStr(e)}</b></span></div>
    <div class="ctl">
      ${e.unit==="reps"?`<div class="grp"><span class="k">Sets</span><button>−</button><span class="v">${e.sets}</span><button>+</button></div>`:""}
      <div class="grp"><span class="k">${klab(e)}</span><button>−</button><span class="v">${vstr(e)}</span><button>+</button></div>
      ${e.weight?`<div class="grp"><span class="k">Kg</span><button>−</button><span class="v">${e.weight}</span><button>+</button></div>`:""}
      <span class="sp"></span>
      <button class="go ${e.done?"is":""}">${e.done?"✓ Done":"Done"}</button>
    </div>`;
  list.appendChild(c);
});
</script>
</body>
</html>
