<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Monotonic — GitHub style</title>
<style>
  :root{
    --fg:#1f2328; --muted:#59636e; --link:#0969da; --line:#d1d9e0; --canvas:#f6f8fa;
    --bg:#ffffff; --green:#1f883d; --greenh:#1a7f37; --open:#1a7f37; --closed:#8250df;
    --font:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;
    --mono:ui-monospace,SFMono-Regular,"SF Mono",Menlo,monospace;
  }
  *{box-sizing:border-box;margin:0;-webkit-tap-highlight-color:transparent}
  body{font-family:var(--font);color:var(--fg);background:var(--bg);-webkit-font-smoothing:antialiased;
    max-width:480px;margin:0 auto;min-height:100dvh;user-select:none;font-size:14px}
  .topbar{background:#ffffff;border-bottom:1px solid var(--line);padding:14px 16px;display:flex;align-items:center;gap:8px}
  .repo{font-size:16px}
  .repo .o{color:var(--link)} .repo b{font-weight:600;color:var(--link)}
  .vis{font-size:12px;color:var(--muted);border:1px solid var(--line);border-radius:99px;padding:1px 8px;margin-left:4px}
  svg{display:block;fill:currentColor;flex:none}

  .tabs{display:flex;gap:4px;padding:0 8px;border-bottom:1px solid var(--line);overflow:auto}
  .tab{padding:10px 10px;font-size:14px;color:var(--fg);display:flex;align-items:center;gap:7px;border-bottom:2px solid transparent;white-space:nowrap}
  .tab .ct{background:#dfe3e8;color:var(--fg);font-size:12px;font-weight:600;border-radius:99px;padding:0 7px}
  .tab.on{font-weight:600;border-bottom-color:#fd8c73}

  .wrap{padding:16px}
  .panel{border:1px solid var(--line);border-radius:6px;overflow:hidden}
  .phead{background:var(--canvas);border-bottom:1px solid var(--line);padding:10px 14px;font-size:13px;font-weight:600;color:var(--fg);display:flex;align-items:center;gap:8px}
  .phead .dot{color:var(--open)}
  .item{display:flex;gap:10px;padding:12px 14px;border-bottom:1px solid var(--line);flex-wrap:wrap;align-items:flex-start}
  .item:last-child{border-bottom:none}
  .ico{color:var(--open);margin-top:2px}
  .item.done .ico{color:var(--closed)}
  .main{flex:1;min-width:170px}
  .title{font-size:15px;font-weight:600;color:var(--fg);line-height:1.3}
  .title .diff{font-family:var(--mono);font-size:12px;font-weight:600;color:var(--greenh);background:#dafbe1;border-radius:6px;padding:1px 6px;margin-left:6px}
  .item.done .title{color:var(--muted);text-decoration:line-through;font-weight:500}
  .meta{font-size:12px;color:var(--muted);margin-top:4px}
  .lab{display:inline-block;font-size:11px;border:1px solid var(--line);border-radius:99px;padding:0 8px;color:var(--muted);margin-left:6px;vertical-align:1px}

  .ctl{display:flex;align-items:center;gap:8px;margin-left:auto;margin-top:1px}
  .seg{display:inline-flex;border:1px solid var(--line);border-radius:6px;overflow:hidden}
  .seg button{width:30px;height:30px;border:none;background:var(--canvas);color:var(--fg);font-size:16px;line-height:1}
  .seg button:active{background:#eef1f4}
  .seg .v{min-width:44px;text-align:center;line-height:30px;background:#fff;border-left:1px solid var(--line);border-right:1px solid var(--line);font-size:13px;font-weight:600;font-variant-numeric:tabular-nums;font-family:var(--mono)}
  .btn{border:1px solid rgba(31,35,40,.15);background:var(--green);color:#fff;font-family:var(--font);font-size:13px;font-weight:600;padding:6px 12px;border-radius:6px;box-shadow:0 1px 0 rgba(31,35,40,.1)}
  .btn:active{background:var(--greenh)}
  .btn.ghost{background:#f6f8fa;color:var(--fg)}
</style>
</head>
<body>
  <div class="topbar">
    <svg width="16" height="16" viewBox="0 0 16 16"><path d="M2 2.5A2.5 2.5 0 0 1 4.5 0h8.75a.75.75 0 0 1 .75.75v12.5a.75.75 0 0 1-.75.75h-2.5a.75.75 0 0 1 0-1.5h1.75v-2h-8a1 1 0 0 0-.714 1.7.75.75 0 1 1-1.072 1.05A2.495 2.495 0 0 1 2 11.5Zm10.5-1h-8a1 1 0 0 0-1 1v6.708A2.486 2.486 0 0 1 4.5 9h8ZM5 12.25a.25.25 0 0 1 .25-.25h3.5a.25.25 0 0 1 .25.25v3.25a.25.25 0 0 1-.4.2l-1.45-1.087a.249.249 0 0 0-.3 0L5.4 15.7a.25.25 0 0 1-.4-.2Z"></path></svg>
    <span class="repo"><span class="o">tetigi</span> / <b>daily</b></span>
    <span class="vis">Public</span>
  </div>
  <div class="tabs">
    <div class="tab">Code</div>
    <div class="tab on"><svg width="16" height="16" viewBox="0 0 16 16"><path d="M8 9.5a1.5 1.5 0 1 0 0-3 1.5 1.5 0 0 0 0 3Z"></path><path d="M8 0a8 8 0 1 1 0 16A8 8 0 0 1 8 0ZM1.5 8a6.5 6.5 0 1 0 13 0 6.5 6.5 0 0 0-13 0Z"></path></svg>Issues<span class="ct">5</span></div>
    <div class="tab">Pull requests</div>
    <div class="tab">Actions</div>
  </div>

  <div class="wrap">
    <div class="panel">
      <div class="phead"><svg class="dot" width="16" height="16" viewBox="0 0 16 16"><path d="M8 9.5a1.5 1.5 0 1 0 0-3 1.5 1.5 0 0 0 0 3Z"></path><path d="M8 0a8 8 0 1 1 0 16A8 8 0 0 1 8 0ZM1.5 8a6.5 6.5 0 1 0 13 0 6.5 6.5 0 0 0-13 0Z"></path></svg>4 Open · <span style="color:var(--muted);font-weight:400">1 Closed</span></div>
      <div id="list"></div>
    </div>
  </div>

<script>
const OPEN='<svg width="16" height="16" viewBox="0 0 16 16"><path d="M8 9.5a1.5 1.5 0 1 0 0-3 1.5 1.5 0 0 0 0 3Z"></path><path d="M8 0a8 8 0 1 1 0 16A8 8 0 0 1 8 0ZM1.5 8a6.5 6.5 0 1 0 13 0 6.5 6.5 0 0 0-13 0Z"></path></svg>';
const CLOSED='<svg width="16" height="16" viewBox="0 0 16 16"><path d="M11.28 6.78a.75.75 0 0 0-1.06-1.06L7.25 8.69 5.78 7.22a.75.75 0 0 0-1.06 1.06l2 2a.75.75 0 0 0 1.06 0Z"></path><path d="M16 8A8 8 0 1 1 0 8a8 8 0 0 1 16 0Zm-1.5 0a6.5 6.5 0 1 0-13 0 6.5 6.5 0 0 0 13 0Z"></path></svg>';
const EX=[
 {name:"Run",sets:1,val:10,unit:"min",last:10,diff:"",lab:"cardio"},
 {name:"Pull-ups",sets:3,val:7,unit:"reps",last:7,diff:"",lab:"upper"},
 {name:"Wall Sits",sets:3,val:65,unit:"time",last:60,diff:"+5s",lab:"core"},
 {name:"Deadlift",sets:3,val:8,unit:"reps",weight:72.5,last:8,lastW:70,diff:"+2.5kg",lab:"lift"},
 {name:"Push-ups",sets:3,val:15,unit:"reps",last:15,done:true,lab:"upper"},
];
const mmss=s=>`${Math.floor(s/60)}:${String(s%60).padStart(2,"0")}`;
const vstr=e=>e.unit==="time"?mmss(e.val):`${e.val}`;
function meta(e,i){
  let last=e.unit==="time"?`${e.sets}×${mmss(e.last)}`:e.unit==="min"?`${e.last} min`:`${e.sets}×${e.last}`;
  if(e.lastW)last+=` · ${e.lastW}kg`;
  return `#${i+1} · last ${last}<span class="lab">${e.lab}</span>`;
}
const list=document.getElementById("list");
EX.forEach((e,i)=>{
  const it=document.createElement("div");
  it.className="item"+(e.done?" done":"");
  const diff=e.diff?` <span class="diff">${e.diff}</span>`:"";
  it.innerHTML=`
    <span class="ico">${e.done?CLOSED:OPEN}</span>
    <div class="main">
      <div class="title">${e.name}${e.done?"":diff}</div>
      <div class="meta">${meta(e,i)}</div>
    </div>
    ${e.done?'<div class="ctl"><button class="btn ghost">Reopen</button></div>':`
    <div class="ctl">
      <div class="seg"><button>−</button><span class="v">${e.unit==="reps"?`${e.sets}×${vstr(e)}`:vstr(e)}${e.weight?` ${e.weight}`:""}</span><button>+</button></div>
      <button class="btn">Done</button>
    </div>`}`;
  list.appendChild(it);
});
</script>
</body>
</html>
