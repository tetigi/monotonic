<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Monotonic — Ledger</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;1,9..144,500&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0c0c0d; --ink:#e9e7e2; --dim:#6c6a64; --line:#1f1f20;
    --up:#9fd16b; --down:#e0a23c; --paper:#141415;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0}
  html,body{background:var(--bg);color:var(--ink);font-family:"IBM Plex Mono",monospace;-webkit-font-smoothing:antialiased}
  body{max-width:480px;margin:0 auto;padding:28px 22px 60px;user-select:none}
  header{display:flex;align-items:flex-end;justify-content:space-between;border-bottom:1px solid var(--line);padding-bottom:16px;margin-bottom:6px}
  .title{font-family:"Fraunces",serif;font-style:italic;font-size:34px;line-height:.9;letter-spacing:-.01em}
  .meta{text-align:right;font-size:11px;color:var(--dim);letter-spacing:.08em;text-transform:uppercase;line-height:1.5}
  .meta b{color:var(--ink);font-weight:500}

  .row{border-bottom:1px solid var(--line);padding:15px 0 14px;position:relative}
  .row::before{content:"";position:absolute;left:-22px;top:0;bottom:-1px;width:2px;background:transparent}
  .row.up::before{background:var(--up)}
  .row.down::before{background:var(--down)}
  .head{display:flex;align-items:baseline;gap:12px;cursor:pointer}
  .name{flex:1;font-size:16px;letter-spacing:-.01em}
  .spec{font-variant-numeric:tabular-nums;font-size:16px;font-weight:500;white-space:nowrap}
  .spec .x{color:var(--dim)}
  .spec .w{color:var(--dim)}
  .arrow{font-size:11px;margin-left:8px}
  .up .arrow{color:var(--up)} .down .arrow{color:var(--down)} .same .arrow{color:var(--dim)}
  .lastline{margin-top:5px;font-size:11px;color:var(--dim);letter-spacing:.04em}

  .row.done .name{text-decoration:line-through;text-decoration-thickness:1px}
  .row.done{opacity:.4}
  .tick{color:var(--up);font-size:13px;margin-right:8px;opacity:0}
  .row.done .tick{opacity:1}

  /* expanded controls */
  .ctl{display:none;gap:18px;margin-top:14px;align-items:center;flex-wrap:wrap}
  .row.open .ctl{display:flex}
  .row.open{background:var(--paper);margin:0 -22px;padding:15px 22px 18px;border-radius:0}
  .field{display:flex;align-items:center;gap:10px}
  .field .lab{font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:.1em;min-width:34px}
  .stp{width:38px;height:38px;border:1px solid var(--line);background:#0c0c0d;color:var(--ink);font-size:20px;border-radius:9px;font-family:inherit}
  .stp:active{background:#000}
  .num{font-variant-numeric:tabular-nums;font-size:18px;font-weight:600;min-width:30px;text-align:center}
  .acts{display:flex;gap:10px;margin-left:auto}
  .act{font-family:inherit;font-size:12px;letter-spacing:.08em;text-transform:uppercase;background:none;border:1px solid var(--line);color:var(--dim);padding:9px 14px;border-radius:8px}
  .act.done{border-color:var(--up);color:var(--up)}
</style>
</head>
<body>
  <header>
    <div class="title">Daily</div>
    <div class="meta">Saturday<br><b>5</b> exercises</div>
  </header>
  <div id="list"></div>

<script>
const EX=[
 {name:"Run",sets:1,val:10,unit:"min",last:10,cue:"same"},
 {name:"Pull-ups",sets:3,val:7,unit:"reps",last:7,cue:"same"},
 {name:"Wall Sits",sets:3,val:65,unit:"time",last:60,cue:"up",open:true},
 {name:"Deadlift",sets:3,val:8,unit:"reps",weight:72.5,last:8,lastW:70,cue:"up"},
 {name:"Push-ups",sets:3,val:15,unit:"reps",last:15,cue:"same",done:true},
];
const mmss=s=>`${Math.floor(s/60)}:${String(s%60).padStart(2,"0")}`;
const valStr=(e,v=e.val)=> e.unit==="time"?mmss(v): e.unit==="min"?`${v}m`:`${v}`;
function spec(e){
  if(e.unit!=="reps"&&e.sets===1) return `<span class="spec">${valStr(e)}</span>`;
  let s=`<span class="spec">${e.sets}<span class="x">×</span>${valStr(e)}`;
  if(e.weight) s+=`<span class="w"> · ${e.weight}</span>`;
  return s+"</span>";
}
function lastStr(e){
  let s=e.unit!=="reps"&&e.sets===1?valStr(e,e.last):`${e.sets}×${valStr(e,e.last)}`;
  if(e.lastW) s+=` · ${e.lastW}`;
  return `last ${s}`;
}
const list=document.getElementById("list");
EX.forEach((e,i)=>{
  const row=document.createElement("div");
  row.className=`row ${e.cue}${e.done?" done":""}${e.open?" open":""}`;
  const arrow=e.cue==="up"?"▲":e.cue==="down"?"▼":"=";
  row.innerHTML=`
    <div class="head"><span class="tick">✓</span><span class="name">${e.name}</span>${spec(e)}<span class="arrow">${arrow}</span></div>
    <div class="lastline">${lastStr(e)}</div>
    <div class="ctl">
      <div class="field"><span class="lab">Sets</span><button class="stp">−</button><span class="num">${e.sets}</span><button class="stp">+</button></div>
      <div class="field"><span class="lab">${e.unit==="time"?"Time":e.unit==="min"?"Min":"Reps"}</span><button class="stp">−</button><span class="num">${valStr(e)}</span><button class="stp">+</button></div>
      <div class="acts"><button class="act done">Done</button><button class="act">Skip</button></div>
    </div>`;
  row.querySelector(".head").onclick=()=>row.classList.toggle("open");
  list.appendChild(row);
});
</script>
</body>
</html>
