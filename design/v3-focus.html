<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Monotonic — Focus</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,700;12..96,800&display=swap" rel="stylesheet">
<style>
  :root{ --bg:#0a0a0b; --ink:#f4f3f0; --dim:#5c5b57; --line:#1c1c1e; --acc:#c6f24e; }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0}
  html,body{height:100%}
  body{background:var(--bg);color:var(--ink);font-family:"Bricolage Grotesque",sans-serif;
    -webkit-font-smoothing:antialiased;max-width:480px;margin:0 auto;min-height:100dvh;
    display:flex;flex-direction:column;padding:26px 24px 30px;user-select:none}

  .top{display:flex;align-items:center;justify-content:space-between}
  .plan{font-size:13px;letter-spacing:.16em;text-transform:uppercase;color:var(--dim);font-weight:600}
  .count{font-size:13px;font-weight:700;font-variant-numeric:tabular-nums}
  .count b{color:var(--acc)}
  .dots{display:flex;gap:6px;margin-top:14px}
  .dot{height:3px;flex:1;background:var(--line);border-radius:2px}
  .dot.on{background:var(--ink)}
  .dot.cur{background:var(--acc)}

  .stage{flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center}
  .name{font-size:30px;font-weight:700;letter-spacing:-.02em;margin-bottom:4px}
  .last{font-size:13px;color:var(--dim);letter-spacing:.04em;margin-bottom:22px}

  .hero{display:flex;align-items:center;gap:22px}
  .big{font-size:128px;font-weight:800;line-height:.82;letter-spacing:-.05em;font-variant-numeric:tabular-nums}
  .pm{width:62px;height:62px;border-radius:50%;border:1px solid var(--line);background:none;color:var(--ink);font-size:34px;font-weight:400;line-height:1}
  .pm:active{background:#141416}
  .herolab{font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:var(--dim);margin-top:10px;font-weight:600}

  .aux{display:flex;gap:10px;margin-top:30px}
  .chip{display:flex;align-items:center;gap:10px;border:1px solid var(--line);border-radius:999px;padding:8px 8px 8px 16px}
  .chip .k{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--dim);font-weight:600}
  .chip .val{font-size:16px;font-weight:700;font-variant-numeric:tabular-nums;min-width:30px;text-align:center}
  .mini{width:30px;height:30px;border-radius:50%;border:none;background:#161618;color:var(--ink);font-size:17px;line-height:1}

  .foot{display:flex;gap:12px;margin-top:26px}
  .btn{flex:1;height:58px;border-radius:16px;border:none;font-family:inherit;font-size:16px;font-weight:700;letter-spacing:.02em}
  .skip{background:#141416;color:var(--dim)}
  .done{background:var(--acc);color:#16210a}
</style>
</head>
<body>
  <div class="top">
    <span class="plan">Daily</span>
    <span class="count"><b>04</b> / 05</span>
  </div>
  <div class="dots">
    <span class="dot on"></span><span class="dot on"></span><span class="dot on"></span>
    <span class="dot cur"></span><span class="dot"></span>
  </div>

  <div class="stage">
    <div class="name">Deadlift</div>
    <div class="last">last 3×8 · 70kg</div>

    <div class="hero">
      <button class="pm">−</button>
      <div class="big" id="reps">8</div>
      <button class="pm">+</button>
    </div>
    <div class="herolab">Reps ▲</div>

    <div class="aux">
      <div class="chip"><span class="k">Sets</span><button class="mini">−</button><span class="val">3</span><button class="mini">+</button></div>
      <div class="chip"><span class="k">Kg</span><button class="mini">−</button><span class="val">72.5</span><button class="mini">+</button></div>
    </div>
  </div>

  <div class="foot">
    <button class="btn skip">Skip</button>
    <button class="btn done">Done →</button>
  </div>
</body>
</html>
