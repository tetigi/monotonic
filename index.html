<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <meta name="theme-color" content="#0b0b0c">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Monotonic">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="icons/icon-180.png">
  <title>Monotonic</title>
  <style>
    :root {
      --bg: #0b0b0c;
      --card: #1c1c1e;
      --card2: #2c2c2e;
      --text: #f2f2f7;
      --muted: #8e8e93;
      --green: #34c759;
      --amber: #ff9f0a;
      --accent: #0a84ff;
      --line: #3a3a3c;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body {
      margin: 0; padding: 0;
      background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      touch-action: manipulation;
      overscroll-behavior: none;
      user-select: none; -webkit-user-select: none;
    }
    body {
      padding:
        max(env(safe-area-inset-top), 8px)
        max(env(safe-area-inset-right), 12px)
        max(env(safe-area-inset-bottom), 12px)
        max(env(safe-area-inset-left), 12px);
      max-width: 640px; margin: 0 auto;
    }
    header {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 12px;
    }
    #planSelect {
      flex: 1; min-width: 0;
      background: var(--card); color: var(--text);
      border: 1px solid var(--line); border-radius: 12px;
      padding: 12px 14px; font-size: 18px; font-weight: 600;
      -webkit-appearance: none; appearance: none;
    }
    .iconbtn {
      flex: 0 0 auto;
      width: 48px; height: 48px;
      background: var(--card); color: var(--text);
      border: 1px solid var(--line); border-radius: 12px;
      font-size: 20px; line-height: 1;
      display: grid; place-items: center;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-left: 4px solid var(--line);
      border-radius: 14px;
      padding: 12px 12px 14px;
      margin-bottom: 12px;
      transition: opacity .15s ease;
    }
    .card.cue-up, .card.cue-same { border-left-color: var(--green); }
    .card.cue-down { border-left-color: var(--amber); }
    .card.resolved { opacity: .45; }
    .card-top {
      display: flex; align-items: baseline; justify-content: space-between;
      gap: 8px; margin-bottom: 10px;
    }
    .ex-name { font-size: 19px; font-weight: 700; }
    .ex-last { font-size: 13px; color: var(--muted); white-space: nowrap; }
    .ex-last .glyph { font-weight: 700; margin-left: 4px; }
    .cue-up .glyph { color: var(--green); }
    .cue-same .glyph { color: var(--green); }
    .cue-down .glyph { color: var(--amber); }
    .stepper {
      display: grid;
      grid-template-columns: 64px 1fr auto 1fr;
      align-items: center;
      gap: 8px;
      margin: 8px 0;
    }
    .stepper .lbl { font-size: 14px; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; }
    .stepper .val { text-align: center; font-size: 26px; font-weight: 700; font-variant-numeric: tabular-nums; padding: 6px 0; }
    .step {
      height: 56px; width: 100%;
      background: var(--card2); color: var(--text);
      border: none; border-radius: 12px;
      font-size: 30px; font-weight: 600; line-height: 1;
    }
    .step:active { background: #3a3a3c; }
    .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 12px; }
    .btn {
      height: 54px; border: 1px solid var(--line); border-radius: 12px;
      background: var(--card2); color: var(--text);
      font-size: 17px; font-weight: 700;
    }
    .btn.done.on { background: var(--green); border-color: var(--green); color: #042; }
    .btn.skip.on { background: var(--amber); border-color: var(--amber); color: #321; }
    .msg { color: var(--muted); text-align: center; padding: 40px 16px; line-height: 1.5; }
    dialog {
      background: var(--card); color: var(--text);
      border: 1px solid var(--line); border-radius: 16px;
      width: min(92vw, 480px); padding: 18px;
    }
    dialog::backdrop { background: rgba(0,0,0,.6); }
    dialog h2 { margin: 0 0 12px; font-size: 18px; }
    dialog label { display: block; font-size: 13px; color: var(--muted); margin: 12px 0 6px; }
    dialog input[type=text] {
      width: 100%; background: var(--bg); color: var(--text);
      border: 1px solid var(--line); border-radius: 10px; padding: 12px; font-size: 16px;
    }
    .row { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 14px; }
    .row .btn { height: 46px; flex: 1 1 auto; font-size: 15px; }
    .hint { font-size: 12px; color: var(--muted); margin-top: 8px; }
    .err { color: var(--amber); white-space: pre-wrap; font-size: 13px; margin-top: 8px; }
  </style>
</head>
<body>
  <header>
    <select id="planSelect" aria-label="Select plan"></select>
    <button class="iconbtn" id="openSettings" aria-label="Settings">&#9881;</button>
  </header>
  <main id="session"></main>

  <dialog id="settings">
    <h2>Settings</h2>
    <label for="urlInput">Plans URL (TOML)</label>
    <input type="text" id="urlInput" placeholder="https://gist.githubusercontent.com/.../raw/plans.toml" inputmode="url" autocapitalize="off" autocorrect="off" spellcheck="false">
    <div class="hint">Leave blank to use the bundled <code>plans.toml</code>.</div>
    <div class="row">
      <button class="btn" id="saveUrl">Save &amp; refresh</button>
      <button class="btn" id="refreshPlans">Refresh</button>
    </div>
    <div class="row">
      <button class="btn" id="restartSession">Restart session</button>
    </div>
    <div class="row">
      <button class="btn" id="exportBackup">Export backup</button>
      <button class="btn" id="importBackup">Import backup</button>
    </div>
    <div class="hint" id="fetchInfo"></div>
    <div class="err" id="settingsErr"></div>
    <div class="row">
      <button class="btn" id="closeSettings">Close</button>
    </div>
  </dialog>

  <input type="file" id="importFile" accept="application/json,.json" hidden>

  <script type="module" src="app.js"></script>
</body>
</html>
